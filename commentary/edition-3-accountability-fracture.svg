<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200" role="img" aria-labelledby="t d">
  <title id="t">Editions 1-3 — The Accountability Chain, Three Fractures</title>
  <desc id="d">A three-row table mapping the formal output the statute requires at each stage of the Commonwealth FOI Act against the substantive reality the system produces. Edition 1 deemed decisions, Edition 2 statements of reasons, Edition 3 review queues. Each stage preserves form. The substance thins.</desc>

  <defs>
    <style type="text/css"><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Spectral:wght@700&family=Manrope:wght@400;600;700&family=JetBrains+Mono:wght@500;600&display=swap');
      .eyebrow      { font-family: 'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace; font-size: 14px; letter-spacing: 3px; fill: #3ABEF9; opacity: 0.85; }
      .title        { font-family: 'Spectral', Georgia, 'Times New Roman', serif; font-size: 44px; font-weight: 700; fill: #E8F4F8; }
      .subtitle     { font-family: 'Manrope', -apple-system, 'Helvetica Neue', Arial, sans-serif; font-size: 18px; fill: #8B9DB8; }
      .colhead      { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 11px; letter-spacing: 3px; fill: #8B9DB8; font-weight: 600; }
      .chip-text    { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 11px; letter-spacing: 1.5px; fill: #8B9DB8; font-weight: 600; }
      .row-head     { font-family: 'Manrope', sans-serif; font-size: 22px; font-weight: 700; fill: #3ABEF9; }
      .row-head-dim { font-family: 'Manrope', sans-serif; font-size: 22px; font-weight: 700; fill: #E8F4F8; }
      .row-body     { font-family: 'Manrope', sans-serif; font-size: 16px; fill: #8B9DB8; }
      .caption-it   { font-family: 'Spectral', Georgia, serif; font-size: 18px; font-style: italic; fill: #E8F4F8; }
      .footer       { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 11px; letter-spacing: 3px; fill: #5B7C99; }
    ]]></style>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A1F2E" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#0F1730" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#070b16" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="1200" fill="#070b16"/>
  <rect width="1200" height="1200" fill="url(#bgGrad)"/>

  <text class="eyebrow" x="600" y="82" text-anchor="middle">EDITIONS 1 - 3 &#183; GOVERNANCE BY DESIGN</text>
  <text class="title" x="600" y="148" text-anchor="middle">The Accountability Chain</text>
  <text class="title" x="600" y="196" text-anchor="middle">Three Fractures</text>
  <text class="subtitle" x="600" y="240" text-anchor="middle">At each stage, the system produces the formal output it requires.</text>
  <text class="subtitle" x="600" y="268" text-anchor="middle">The substance thins.</text>

  <rect x="80" y="310" width="1040" height="770" rx="18" ry="18" fill="rgba(26,31,46,0.45)" stroke="rgba(74,159,216,0.25)" stroke-width="1"/>

  <!-- Column headers -->
  <text class="colhead" x="240" y="370">FORMAL OUTPUT</text>
  <text class="colhead" x="680" y="370">SUBSTANTIVE REALITY</text>
  <line x1="120" y1="390" x2="1080" y2="390" stroke="rgba(74,159,216,0.15)" stroke-width="1"/>

  <!-- Vertical dashed connector for edition chips -->
  <line x1="155" y1="455" x2="155" y2="930" stroke="rgba(100,116,139,0.3)" stroke-dasharray="2 6" stroke-width="1"/>

  <!-- Row 1 — Ed. 1 -->
  <rect x="125" y="437" width="60" height="22" rx="11" fill="rgba(26,31,46,0.7)" stroke="rgba(74,159,216,0.35)" stroke-width="1"/>
  <text class="chip-text" x="155" y="453" text-anchor="middle">Ed. 1</text>
  <circle cx="155" cy="492" r="5" fill="#0F1730" stroke="#64748B" stroke-width="1.5"/>

  <rect x="220" y="430" width="410" height="130" rx="10" fill="rgba(26,31,46,0.55)" stroke="rgba(74,159,216,0.22)" stroke-width="1"/>
  <rect x="220" y="430" width="4" height="130" fill="#3ABEF9" rx="2"/>
  <text class="row-head"   x="245" y="475">Deemed decision</text>
  <text class="row-body"   x="245" y="510">Statutory deadline expires. The FOI Act</text>
  <text class="row-body"   x="245" y="534">deems a refusal to have occurred.</text>

  <rect x="660" y="430" width="420" height="130" rx="10" fill="rgba(26,31,46,0.35)" stroke="rgba(100,116,139,0.25)" stroke-width="1"/>
  <text class="row-head-dim" x="685" y="475">No decision made</text>
  <text class="row-body"     x="685" y="510">No assessment of the request. No exercise</text>
  <text class="row-body"     x="685" y="534">of judgement. No reasons.</text>

  <!-- Row 2 — Ed. 2 -->
  <rect x="125" y="607" width="60" height="22" rx="11" fill="rgba(26,31,46,0.7)" stroke="rgba(74,159,216,0.35)" stroke-width="1"/>
  <text class="chip-text" x="155" y="623" text-anchor="middle">Ed. 2</text>
  <circle cx="155" cy="662" r="5" fill="#0F1730" stroke="#64748B" stroke-width="1.5"/>

  <rect x="220" y="600" width="410" height="130" rx="10" fill="rgba(26,31,46,0.55)" stroke="rgba(74,159,216,0.22)" stroke-width="1"/>
  <rect x="220" y="600" width="4" height="130" fill="#3ABEF9" rx="2"/>
  <text class="row-head"   x="245" y="645">Statement of reasons</text>
  <text class="row-body"   x="245" y="680">Agency issues a decision with reasons</text>
  <text class="row-body"   x="245" y="704">under the FOI Act.</text>

  <rect x="660" y="600" width="420" height="130" rx="10" fill="rgba(26,31,46,0.35)" stroke="rgba(100,116,139,0.25)" stroke-width="1"/>
  <text class="row-head-dim" x="685" y="645">Reasons inadequate</text>
  <text class="row-body"     x="685" y="680">Factors listed but not weighed. Assertion</text>
  <text class="row-body"     x="685" y="704">substituted for analysis.</text>

  <!-- Row 3 — Ed. 3 -->
  <rect x="125" y="777" width="60" height="22" rx="11" fill="rgba(26,31,46,0.7)" stroke="rgba(74,159,216,0.35)" stroke-width="1"/>
  <text class="chip-text" x="155" y="793" text-anchor="middle">Ed. 3</text>
  <circle cx="155" cy="832" r="5" fill="#0F1730" stroke="#64748B" stroke-width="1.5"/>

  <rect x="220" y="770" width="410" height="130" rx="10" fill="rgba(26,31,46,0.55)" stroke="rgba(74,159,216,0.22)" stroke-width="1"/>
  <rect x="220" y="770" width="4" height="130" fill="#3ABEF9" rx="2"/>
  <text class="row-head"   x="245" y="815">Review queue</text>
  <text class="row-body"   x="245" y="850">IC review application lodged. Matter</text>
  <text class="row-body"   x="245" y="874">enters the statutory review process.</text>

  <rect x="660" y="770" width="420" height="130" rx="10" fill="rgba(26,31,46,0.35)" stroke="rgba(100,116,139,0.25)" stroke-width="1"/>
  <text class="row-head-dim" x="685" y="815">Review cannot reach</text>
  <text class="row-body"     x="685" y="850">Caseload pressure. Reviews dormant for</text>
  <text class="row-body"     x="685" y="874">years. Deficient decisions persist untested.</text>

  <!-- Italic caption -->
  <line x1="120" y1="960" x2="1080" y2="960" stroke="rgba(74,159,216,0.15)" stroke-width="1"/>
  <text class="caption-it" x="600" y="1020" text-anchor="middle">Each stage preserves form. The substance thins.</text>

  <text class="footer" x="600" y="1170" text-anchor="middle">GLASSCASE &#183; GOVERNANCE BY DESIGN</text>
</svg>
