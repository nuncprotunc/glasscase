<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1300" width="1200" height="1300" role="img" aria-labelledby="t d">
  <title id="t">Edition 4 — The Missing Design Layer</title>
  <desc id="d">A two-row architecture diagram. Current state shows law and behaviour with design absent between them. Proposed model inserts design — decision scaffolding, workflow ownership, documentation architecture, reconsideration triggers, accountability signals — between law and behaviour. Design is how obligations become operational.</desc>

  <defs>
    <style type="text/css"><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Spectral:wght@700&family=Manrope:wght@400;600;700&family=JetBrains+Mono:wght@500;600&display=swap');
      .eyebrow      { font-family: 'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace; font-size: 14px; letter-spacing: 3px; fill: #3ABEF9; opacity: 0.85; }
      .title        { font-family: 'Spectral', Georgia, 'Times New Roman', serif; font-size: 44px; font-weight: 700; fill: #E8F4F8; }
      .subtitle     { font-family: 'Manrope', -apple-system, 'Helvetica Neue', Arial, sans-serif; font-size: 17px; fill: #8B9DB8; }
      .seclabel     { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 11px; letter-spacing: 3px; fill: #8B9DB8; }
      .ch-on        { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 16px; letter-spacing: 2px; font-weight: 600; fill: #3ABEF9; }
      .ch-dim       { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 16px; letter-spacing: 2px; font-weight: 600; fill: #8B9DB8; }
      .bul          { font-family: 'Manrope', sans-serif; font-size: 15px; fill: #B6C5D8; }
      .bul-dim      { font-family: 'Manrope', sans-serif; font-size: 15px; fill: #8B9DB8; }
      .dot          { fill: #3ABEF9; }
      .dot-dim      { fill: #64748B; }
      .mark         { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700; fill: #64748B; }
      .arrow        { fill: #64748B; font-family: 'Manrope', sans-serif; font-size: 22px; }
      .callout-body { font-family: 'Manrope', sans-serif; font-size: 19px; font-weight: 600; fill: #E8F4F8; }
      .accent       { fill: #3ABEF9; }
      .footer       { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 11px; letter-spacing: 3px; fill: #5B7C99; }
    ]]></style>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A1F2E" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#0F1730" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#070b16" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="1300" fill="#070b16"/>
  <rect width="1200" height="1300" fill="url(#bgGrad)"/>

  <text class="eyebrow" x="600" y="80" text-anchor="middle">EDITION 4 &#183; GOVERNANCE BY DESIGN</text>
  <text class="title" x="600" y="148" text-anchor="middle">The Missing Design Layer</text>
  <text class="subtitle" x="600" y="195" text-anchor="middle">Law creates obligations. Institutions deliver them through systems.</text>
  <text class="subtitle" x="600" y="220" text-anchor="middle">When the systems were never designed, obligations persist on</text>
  <text class="subtitle" x="600" y="245" text-anchor="middle">paper while behaviour diverges in practice.</text>

  <rect x="60" y="290" width="1080" height="900" rx="18" ry="18" fill="rgba(26,31,46,0.45)" stroke="rgba(74,159,216,0.25)" stroke-width="1"/>

  <!-- Top section: CURRENT STATE -->
  <line x1="100" y1="340" x2="455" y2="340" stroke="rgba(74,159,216,0.18)" stroke-width="1"/>
  <text class="seclabel" x="600" y="345" text-anchor="middle">CURRENT STATE</text>
  <line x1="745" y1="340" x2="1100" y2="340" stroke="rgba(74,159,216,0.18)" stroke-width="1"/>

  <!-- Top LAW card (active) -->
  <rect x="120" y="385" width="350" height="240" rx="12" fill="rgba(26,31,46,0.55)" stroke="rgba(74,159,216,0.22)" stroke-width="1"/>
  <rect x="120" y="385" width="4" height="240" fill="#3ABEF9" rx="2"/>
  <text class="ch-on" x="145" y="425">LAW</text>
  <g transform="translate(145,470)"><circle class="dot" cx="4" cy="-5" r="3"/><text class="bul" x="20" y="0">Statutory obligations</text></g>
  <g transform="translate(145,500)"><circle class="dot" cx="4" cy="-5" r="3"/><text class="bul" x="20" y="0">Output requirements</text></g>
  <g transform="translate(145,530)"><circle class="dot" cx="4" cy="-5" r="3"/><text class="bul" x="20" y="0">Timeframes</text></g>
  <g transform="translate(145,560)"><circle class="dot" cx="4" cy="-5" r="3"/><text class="bul" x="20" y="0">Review rights</text></g>

  <!-- Center marker: DESIGN ABSENT -->
  <line x1="600" y1="430" x2="600" y2="500" stroke="rgba(100,116,139,0.3)" stroke-dasharray="2 6" stroke-width="1"/>
  <circle cx="600" cy="525" r="22" fill="#0F1730" stroke="rgba(100,116,139,0.5)" stroke-width="1"/>
  <text class="mark" x="600" y="534" text-anchor="middle">&#215;</text>
  <text class="seclabel" x="600" y="575" text-anchor="middle">DESIGN ABSENT</text>
  <line x1="600" y1="595" x2="600" y2="615" stroke="rgba(100,116,139,0.3)" stroke-dasharray="2 6" stroke-width="1"/>

  <!-- Top BEHAVIOUR card (dim, dashed) -->
  <rect x="730" y="385" width="350" height="240" rx="12" fill="rgba(26,31,46,0.32)" stroke="rgba(100,116,139,0.3)" stroke-width="1" stroke-dasharray="4 4"/>
  <rect x="730" y="385" width="4" height="240" fill="#64748B" opacity="0.65" rx="2"/>
  <text class="ch-dim" x="755" y="425">BEHAVIOUR</text>
  <g transform="translate(755,470)"><circle class="dot-dim" cx="4" cy="-5" r="3"/><text class="bul-dim" x="20" y="0">Reasoning not recorded</text></g>
  <g transform="translate(755,500)"><circle class="dot-dim" cx="4" cy="-5" r="3"/><text class="bul-dim" x="20" y="0">Ownership diffuse</text></g>
  <g transform="translate(755,530)"><circle class="dot-dim" cx="4" cy="-5" r="3"/><text class="bul-dim" x="20" y="0">Correction retrospective</text></g>
  <g transform="translate(755,560)"><circle class="dot-dim" cx="4" cy="-5" r="3"/><text class="bul-dim" x="20" y="0">Form over substance</text></g>

  <!-- Bottom section: PROPOSED MODEL -->
  <line x1="100" y1="685" x2="450" y2="685" stroke="rgba(74,159,216,0.18)" stroke-width="1"/>
  <text class="seclabel" x="600" y="690" text-anchor="middle">PROPOSED MODEL</text>
  <line x1="750" y1="685" x2="1100" y2="685" stroke="rgba(74,159,216,0.18)" stroke-width="1"/>

  <!-- LAW (bottom, smaller) -->
  <rect x="100" y="730" width="220" height="280" rx="12" fill="rgba(26,31,46,0.55)" stroke="rgba(74,159,216,0.22)" stroke-width="1"/>
  <rect x="100" y="730" width="4" height="280" fill="#3ABEF9" rx="2"/>
  <text class="ch-on" x="125" y="770">LAW</text>
  <g transform="translate(125,815)"><circle class="dot" cx="4" cy="-5" r="3"/><text class="bul" x="20" y="0">Obligations</text></g>
  <g transform="translate(125,845)"><circle class="dot" cx="4" cy="-5" r="3"/><text class="bul" x="20" y="0">Outputs</text></g>
  <g transform="translate(125,875)"><circle class="dot" cx="4" cy="-5" r="3"/><text class="bul" x="20" y="0">Timeframes</text></g>

  <!-- Arrow 1 -->
  <text class="arrow" x="350" y="878" text-anchor="middle">&#8594;</text>

  <!-- DESIGN (bottom, prominent middle) -->
  <rect x="380" y="715" width="380" height="310" rx="12" fill="rgba(58,190,249,0.08)" stroke="rgba(58,190,249,0.4)" stroke-width="1"/>
  <rect x="380" y="715" width="4" height="310" fill="#3ABEF9" rx="2"/>
  <text class="ch-on" x="405" y="760">DESIGN</text>
  <g transform="translate(405,810)"><circle class="dot" cx="4" cy="-5" r="3"/><text class="bul" x="20" y="0">Decision scaffolding</text></g>
  <g transform="translate(405,842)"><circle class="dot" cx="4" cy="-5" r="3"/><text class="bul" x="20" y="0">Workflow ownership</text></g>
  <g transform="translate(405,874)"><circle class="dot" cx="4" cy="-5" r="3"/><text class="bul" x="20" y="0">Documentation architecture</text></g>
  <g transform="translate(405,906)"><circle class="dot" cx="4" cy="-5" r="3"/><text class="bul" x="20" y="0">Reconsideration triggers</text></g>
  <g transform="translate(405,938)"><circle class="dot" cx="4" cy="-5" r="3"/><text class="bul" x="20" y="0">Accountability signals</text></g>

  <!-- Arrow 2 -->
  <text class="arrow" x="790" y="878" text-anchor="middle">&#8594;</text>

  <!-- BEHAVIOUR (bottom, active) -->
  <rect x="820" y="730" width="280" height="280" rx="12" fill="rgba(26,31,46,0.55)" stroke="rgba(74,159,216,0.22)" stroke-width="1"/>
  <rect x="820" y="730" width="4" height="280" fill="#3ABEF9" rx="2"/>
  <text class="ch-on" x="845" y="770">BEHAVIOUR</text>
  <g transform="translate(845,815)"><circle class="dot" cx="4" cy="-5" r="3"/><text class="bul" x="20" y="0">Reasoning captured</text></g>
  <g transform="translate(845,845)"><circle class="dot" cx="4" cy="-5" r="3"/><text class="bul" x="20" y="0">Ownership clear</text></g>
  <g transform="translate(845,875)"><circle class="dot" cx="4" cy="-5" r="3"/><text class="bul" x="20" y="0">Correction upstream</text></g>
  <g transform="translate(845,905)"><circle class="dot" cx="4" cy="-5" r="3"/><text class="bul" x="20" y="0">Substance achievable</text></g>

  <!-- Bottom callout -->
  <rect x="100" y="1070" width="1000" height="100" rx="12" fill="rgba(58,190,249,0.06)" stroke="rgba(58,190,249,0.3)" stroke-width="1"/>
  <rect x="100" y="1070" width="4" height="100" fill="#3ABEF9" rx="2"/>
  <text class="callout-body" x="600" y="1110" text-anchor="middle"><tspan class="accent">Design</tspan> is how obligations become operational.</text>
  <text class="callout-body" x="600" y="1145" text-anchor="middle">Without it, accountability depends on someone else's budget.</text>

  <text class="footer" x="600" y="1265" text-anchor="middle">GLASSCASE &#183; GOVERNANCE BY DESIGN</text>
</svg>
